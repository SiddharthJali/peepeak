services:
  - type: web
    name: peak-breaks
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd backend && python database.py
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
